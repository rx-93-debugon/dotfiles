# clipboard有効化
set -g set-clipboard on


# ==========================================
# 基本設定
# ==========================================
set -g mouse on
set -g mode-keys vi

# 検索を / ? で（コピー・モード内）
bind -T copy-mode-vi / send -X search-forward
bind -T copy-mode-vi ? send -X search-backward

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line

# y で選択内容をコピーしてバッファへ送る（X: send-selection）
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Enter で選択をコピーして抜ける（オプション）
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# 検索を / ? で（コピー・モード内）
bind -T copy-mode-vi / send -X search-forward
bind -T copy-mode-vi ? send -X search-backward

# 256色表示に対応
set -g default-terminal "tmux-256color"

# ステータスバーをトップに配置 (お好みで)
set -g status-position top

# デフォルトシェルを bash に設定
set-option -g default-shell /bin/bash

# \ で縦分割（カレントディレクトリを引き継いで bash を起動）
bind \\ split-window -h -c "#{pane_current_path}" /bin/bash

# - で横分割（カレントディレクトリを引き継いで bash を起動）
bind - split-window -v -c "#{pane_current_path}" /bin/bash
